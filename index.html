<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saham Monitor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Saham Monitor dan Prediksi</h1>
    </header>
    <main>
        <section id="chart-container">
            <p>Grafik Saham (Contoh data statis)</p>
            <canvas id="stockChart"></canvas>
            <div class="tradingview-widget-container">
              <div id="tradingview_abcde"></div>
              <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
              <script type="text/javascript">
              new TradingView.widget({
                 "container_id": "tradingview_abcde",
                 "width": "100%",  // Atur lebar
                 "height": 500,
                 "symbol": "NASDAQ:AAPL",
                 "interval": "D",
                 "timezone": "exchange",
                 "theme": "light",
                 "style": "1",
                 "locale": "en",
                 "toolbar_bg": "#f1f3f6",
                 "enable_publishing": false,
                 "allow_symbol_change": true,
                 "details": true,
                 "hotlist": true,
                 "calendar": true,
                 "studies": [
                    "MACD@tv-basicstudies",
                    "RSI@tv-basicstudies"
                 ]
              });
              </script>
            </div>
        </section>
        <aside>
            <h2>Watchlist</h2>
            <input type="text" id="add-stock" placeholder="Tambah emitten (contoh: AAPL)" />
            <button id="add-button">Tambah</button>
            <table id="watchlist">
                <thead>
                    <tr>
                        <th>Emiten</th>
                        <th>Harga</th>
                        <th>ARB</th>
                        <th>ARA</th>
                        <th>Prediksi 5D</th>
                        <th>Suggest</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Rows will be dynamically populated -->
                </tbody>
            </table>
        </aside>
    </main>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js"></script>
</body>
</html>
